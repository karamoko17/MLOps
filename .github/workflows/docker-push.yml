name: Docker Push to GHCR

on:
  push:
    branches:
      - main  # Déclenche le workflow lorsque tu fais un push sur la branche 'main'
  workflow_dispatch:  # Permet d'exécuter manuellement le workflow depuis GitHub

jobs:
  build_and_push:
    runs-on: ubuntu-22.04

    steps:
      # Checkout le code
      - name: Checkout code
        uses: actions/checkout@v2

      # Se connecter à GitHub Container Registry
      - name: Log in to GitHub Container Registry
        run: echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      # Construire l'image Docker
      - name: Build Docker image
        run: |
          docker build -t ghcr.io/karamoko17/mlops:latest .

      # Pousser l'image Docker vers GHCR
      - name: Push Docker image to GHCR
        run: |
          docker push ghcr.io/karamoko17/mlops:latest
