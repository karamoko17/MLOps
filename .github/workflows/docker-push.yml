name: Docker Push to GHCR

on:
  push:
    branches:
      - main  # Déclenche le workflow quand tu fais un push sur la branche 'main'
  workflow_dispatch:  # Permet d'exécuter manuellement le workflow depuis GitHub

jobs:
  build_and_push:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      # Se connecter à GitHub Container Registry
      - name: Log in to GitHub Container Registry
        run: echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      # Build Docker images using docker-compose
      - name: Build Docker images
        run: |
          docker-compose -f docker-compose.yml build

      # Push Docker images to GHCR
      - name: Push Docker images to GHCR
        run: |
          docker-compose -f docker-compose.yml push
